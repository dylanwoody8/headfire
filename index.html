<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="application-name" content="CruiseNav">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CruiseNav">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a2e1a">
<meta name="description" content="Offline-capable timber cruising field app for drawing tract boundaries, managing jobs, navigating to plots, tallying trees, and generating cruise reports.">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>CruiseNav</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    font-family: Arial, sans-serif;
    background: #0d1a0d;
    color: #e8f0e4;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .launch-card {
    width: min(420px, 100%);
    padding: 28px 24px;
    border-radius: 20px;
    background: linear-gradient(180deg, #1a2e1a, #132313);
    border: 1px solid #3d7a50;
    box-shadow: 0 18px 50px rgba(0,0,0,0.35);
    text-align: center;
  }
  .launch-icon {
    width: 88px;
    height: 88px;
    border-radius: 22px;
    margin: 0 auto 18px;
    background: #254228 url('icons/icon-192.png') center/cover no-repeat;
    border: 1px solid #3d7a50;
  }
  h1 {
    margin: 0 0 8px;
    font-size: 1.8rem;
    color: #6abf4b;
  }
  p {
    margin: 0 0 16px;
    line-height: 1.6;
    color: #a0b89a;
  }
  a {
    color: #8cd970;
    font-weight: 700;
  }
</style>
</head>
<body>
  <div class="launch-card">
    <div class="launch-icon" aria-hidden="true"></div>
    <h1>CruiseNav</h1>
    <p>Launching the timber cruising field app...</p>
    <p>If it does not open automatically, <a href="./CruiseNav.html">tap here</a>.</p>
  </div>
  <script>
    (function () {
      const target = './CruiseNav.html' + window.location.search + window.location.hash;
      function go() {
        window.location.replace(target);
      }

      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js').catch(function () {}).finally(function () {
          setTimeout(go, 120);
        });
      } else {
        setTimeout(go, 120);
      }
    })();
  </script>
</body>
</html>
